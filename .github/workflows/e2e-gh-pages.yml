name: E2E Tests (manual) — GitHub Pages

on:
    workflow_dispatch: {}

jobs:
    e2e:
        name: Run Playwright E2E against GitHub Pages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install dependencies and Playwright
              run: |
                  npm ci || npm install
                  npm install --no-audit --no-fund playwright @playwright/test
                  npx playwright install --with-deps

            - name: Run Playwright tests against GitHub Pages
              env:
                  BASE_URL: "https://p-vlasenko.github.io/higher-web-practice-quiz-generator/"
                  USE_LOCAL_SERVER: "false"
              run: |
                  # produce both console list and HTML report for download
                  npx playwright test --config=e2e-tests/playwright.config.ts --reporter=list,html

            - name: Upload Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report
