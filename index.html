<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
		<title>Генератор квизов</title>
		<link rel="stylesheet" href="./css/pages/_index.css" />
	</head>
	<body>
		<div class="content">
			<header class="header container">
				<div class="header__content container">
					<a href="./index.html">
						<img class="header__logo" src="./assets/logo.svg" alt="Логотип" />
					</a>
					<nav class="header__nav">
						<a class="button button--secondary" href="./quizzes.html">Посмотреть сохранённые квизы</a>
					</nav>
					<button class="header__menu-button" type="button">
						<img class="header__menu-icon" src="./assets/burger.svg" alt="Меню" />
					</button>
				</div>
			</header>

			<main class="main">
				<section class="generator container">
					<h1 class="generator__title">Генератор квизов</h1>
					<p class="generator__hint">Вставьте JSON...</p>
					<p class="generator__label text text--caption">Ваш JSON</p>
					<form class="generator__form">
						<textarea
							id="quiz-json-input"
							name="quiz-json-input"
							class="generator__textarea text text--mono"
							placeholder="{&#10;&laquo;title&raquo;: &laquo;Placeholder&raquo;,&#10;&laquo;questions&raquo;: []&#10;}"
						></textarea>
						<button type="submit" class="button button--primary">Сгенерировать</button>
					</form>
				</section>
			</main>

			<!-- <div class="modal">
				<div class="modal__content">
				</div>
			</div> -->

			<div class="toast toast--error hidden" id="error-toast">
				<div class="toast__icon">&#10060;</div>
				<div class="toast__content">
					<p class="toast__title">Ошибка: не удалось обработать JSON.</p>
					<p class="toast__message text text--caption">Проверьте формат данных и попробуйте снова.</p>
				</div>
				<div class="toast__actions">
					<button type="button" class="button button--secondary toast__action">Продолжить</button>
				</div>
			</div>

			<footer class="footer">
				<div class="footer__content container">Учебный проект 2025</div>
			</footer>
	</div>
	<script type="module" src="./src/pages/main.ts"></script>
	</body>
</html>
